# ========================================
# CONFIGURATION WITH COMMENTS
# ========================================
# This configuration demonstrates the correct handling
# of different types of comments

# Full-line comment
server {
    # Network configuration
    listen 8080;  # Listening port
    iface 127.0.0.1;  # Local interface
    
    # Server name list
    server_name localhost test.local;  # Valid names
    
    # File configuration
    root www;  # Root directory
    index index.html;  # Default index file
    
    # Custom error pages
    error_page 404 /404.html;  # Error 404
    error_page 500 /50x.html;  # Error 500
    
    # Allowed HTTP methods
    allow_methods GET POST DELETE;  # Basic methods
    
    # Behavior configuration
    auto_index on;  # Automatic listing enabled
    # auto_index off;  # This line is commented out
    
    # Commented CGI configuration
    # cgi_pass /usr/bin/php-cgi;  # PHP CGI disabled
    cgi_pass /usr/bin/python3;  # Python CGI enabled
    
    # File upload configuration
    upload_enable on;  # Upload enabled
    upload_store www/uploads;  # Upload directory
    # upload_enable off;  # This setting is commented out
    
    # Location with comments
    location /api {
        # Specific configuration for API
        root www/api;  # API directory
        allow_methods GET POST;  # Only GET and POST
        # allow_methods PUT DELETE;  # PUT and DELETE commented out
        cgi_pass /usr/bin/python3;  # CGI for API
        auto_index off;  # No automatic listing
    }
}

# Fully commented server - should be ignored
# server {
#     listen 9090;
#     server_name example.com;
#     root www-example;
#     index example.html;
# }

# ========================================
# BASIC CONFIGURATION - ONE SERVER
# ========================================
# This configuration shows a basic web server
# with the most common directives

server {
    # Listening port
    listen 8080;
    
    # Network interface
    iface 127.0.0.1;
    
    # Server names
    server_name localhost www.localhost.com;
    
    # Server root directory
    root www;
    
    # Default index file
    index index.html;
    
    # Custom error pages
    error_page 404 error/404.html;
    error_page 403 error/403.html;
    error_page 500 error/500.html;

    # Allowed HTTP methods
    allow_methods GET POST DELETE;
    
    # Maximum request body size
    client_max_body_size 10M;
    
    # Enable automatic directory listing
    auto_index on;
    
    # CGI configuration
    cgi_pass /usr/bin/python3;
    
    # Enable file uploads
    upload_enable on;
    upload_store www/uploads;
}

# ========================================
# MULTIPLE SERVERS CONFIGURATION
# ========================================
# This configuration shows multiple servers
# running on different ports

# Main server - Port 8080
server {
    listen 8080;
    iface 127.0.0.1;
    server_name localhost main.local;
    
    root www;
    index index.html;
    
    error_page 404 /404.html;
    error_page 500 /50x.html;
    
    allow_methods GET POST DELETE;
    auto_index on;
    
    cgi_pass /usr/bin/python3;
    upload_enable on;
    upload_store www/uploads;
}

# Secondary server - Port 8080
server {
    listen 8080;
    iface 127.0.0.1;
    server_name 127.0.0.1;

    root www-api;
    index api.html;
    
    error_page 404 /api-404.html;
    error_page 500 /api-error.html;
    
    allow_methods GET POST PUT DELETE;
    client_max_body_size 50M;
    auto_index off;
    
    cgi_pass /usr/bin/php-cgi;
    upload_enable off;
}

# Development server - Port 8082
server {
    listen 8082;
    iface 127.0.0.1;
    server_name dev.local development.localhost;
    
    root www-dev;
    index dev.html;
    
    error_page 404 error/dev-404.html;
    error_page 500 error/dev-error.html;
    
    allow_methods GET POST;
    auto_index on;
    
    upload_enable off;
    upload_store www-dev/uploads;
}

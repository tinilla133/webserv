# ========================================
# CONFIGURATION WITH DUPLICATE SERVERS
# ========================================
# This configuration has multiple server blocks
# on the same port to test duplicate removal

# First server on port 8080
server {
    listen 8080;
    iface 127.0.0.1;
    server_name localhost www.localhost.com;
    
    root www;
    index index.html;
    auto_index on;
}

# Second server on port 8080 (duplicate)
server {
    listen 8080;
    iface 127.0.0.1;
    server_name localhost www.localhost.com;
    
    root www-duplicate;
    index duplicate.html;
    auto_index off;
}

# Third server on port 8080 with different server_names
server {
    listen 8080;
    iface 127.0.0.1;
    server_name api.localhost api.local;
    
    root www-api;
    index api.html;
    auto_index on;
}

# Fourth server on port 8081 (different port, should not be removed)
server {
    listen 8081;
    iface 127.0.0.1;
    server_name test.localhost;
    
    root www-test;
    index test.html;
    auto_index off;
}
